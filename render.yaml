# Render Blueprint for Universal Healthcare Frontend
# Set NEXT_PUBLIC_API_URL to your deployed backend, e.g.:
#   https://universal-healthcare-api.onrender.com/api/v1
# Set NEXT_PUBLIC_APP_URL to this frontend URL, e.g.:
#   https://universal-healthcare-frontend.onrender.com

services:
  - type: web
    name: universal-healthcare-frontend
    runtime: bun
    plan: free
    buildCommand: bun install && bun run build
    startCommand: bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
